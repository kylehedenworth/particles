<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Motion Momentum Particles</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}
canvas{
  position:absolute;
  top:0;
  left:0;
}
video{
  display:none;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<canvas id="motionCanvas" width="160" height="120" style="display:none"></canvas>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const motionCanvas = document.getElementById("motionCanvas")
const motionCtx = motionCanvas.getContext("2d")

let width = window.innerWidth
let height = window.innerHeight

canvas.width = width
canvas.height = height

let prevFrame = null
let particles = []

const damping = 0.995
const maxParticles = 15000

class Particle{

  constructor(x,y,vx,vy){
    this.x = x
    this.y = y
    this.vx = vx
    this.vy = vy
    this.life = 500
  }

  update(){

    this.x += this.vx
    this.y += this.vy

    this.vx *= damping
    this.vy *= damping

    this.life--
  }

  draw(){
    ctx.beginPath()
    ctx.arc(this.x,this.y,1.5,0,Math.PI*2)
    ctx.fillStyle="white"
    ctx.fill()
  }

  dead(){
    return (
      this.life <= 0 ||
      this.x < -20 ||
      this.x > width+20 ||
      this.y < -20 ||
      this.y > height+20
    )
  }
}

navigator.mediaDevices.getUserMedia({
  video:{facingMode:"user"},
  audio:false
}).then(stream=>{
  video.srcObject = stream
})

function detectMotion(){

  motionCtx.drawImage(video,0,0,motionCanvas.width,motionCanvas.height)

  const frame = motionCtx.getImageData(0,0,motionCanvas.width,motionCanvas.height)

  if(!prevFrame){
    prevFrame = frame
    return []
  }

  const motionPoints = []

  for(let i=0;i<frame.data.length;i+=32){

    const diff =
      Math.abs(frame.data[i]-prevFrame.data[i]) +
      Math.abs(frame.data[i+1]-prevFrame.data[i+1]) +
      Math.abs(frame.data[i+2]-prevFrame.data[i+2])

    if(diff > 70){

      const index = i/4
      const x = index % motionCanvas.width
      const y = Math.floor(index / motionCanvas.width)

      const dx = frame.data[i] - prevFrame.data[i]
      const dy = frame.data[i+1] - prevFrame.data[i+1]

      motionPoints.push({
        x,
        y,
        vx: dx * 0.02,
        vy: dy * 0.02
      })
    }
  }

  prevFrame = frame
  return motionPoints
}

function emitParticles(points){

  for(const p of points){

    const x = p.x/motionCanvas.width * width
    const y = p.y/motionCanvas.height * height

    const vx = p.vx
    const vy = p.vy

    particles.push(new Particle(x,y,vx,vy))
  }

  if(particles.length > maxParticles){
    particles.splice(0, particles.length-maxParticles)
  }
}

function animate(){

  ctx.fillStyle="rgba(0,0,0,0.2)"
  ctx.fillRect(0,0,width,height)

  const motion = detectMotion()

  emitParticles(motion)

  for(let i=particles.length-1;i>=0;i--){

    const p = particles[i]

    p.update()
    p.draw()

    if(p.dead()){
      particles.splice(i,1)
    }
  }

  requestAnimationFrame(animate)
}

animate()

window.addEventListener("resize",()=>{
  width = window.innerWidth
  height = window.innerHeight
  canvas.width = width
  canvas.height = height
})

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hand Particle Flow</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}
canvas{
  position:absolute;
  top:0;
  left:0;
}
video{
  display:none;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<canvas id="motionCanvas" width="160" height="120" style="display:none"></canvas>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const motionCanvas = document.getElementById("motionCanvas")
const motionCtx = motionCanvas.getContext("2d")

let width = window.innerWidth
let height = window.innerHeight

canvas.width = width
canvas.height = height

let prevFrame = null

const particles = []
const maxParticles = 5000
const damping = 0.995

class Particle{

  constructor(x,y){
    this.x = x
    this.y = y
    this.vx = (Math.random()-0.5)*0.5
    this.vy = (Math.random()-0.5)*0.5
  }

  update(){

    this.x += this.vx
    this.y += this.vy

    this.vx *= damping
    this.vy *= damping
  }

  draw(){
    ctx.beginPath()
    ctx.arc(this.x,this.y,1.6,0,Math.PI*2)
    ctx.fillStyle="white"
    ctx.fill()
  }

  offscreen(){
    return (
      this.x < -20 ||
      this.x > width+20 ||
      this.y < -20 ||
      this.y > height+20
    )
  }
}

function spawnEdgeParticle(){

  let side = Math.floor(Math.random()*4)

  if(side===0) return new Particle(Math.random()*width,-5)
  if(side===1) return new Particle(Math.random()*width,height+5)
  if(side===2) return new Particle(-5,Math.random()*height)
  if(side===3) return new Particle(width+5,Math.random()*height)
}

function maintainParticles(){

  while(particles.length < maxParticles){
    particles.push(spawnEdgeParticle())
  }
}

navigator.mediaDevices.getUserMedia({
  video:{facingMode:"user"},
  audio:false
}).then(stream=>{
  video.srcObject = stream
})

function detectMotion(){

  motionCtx.drawImage(video,0,0,motionCanvas.width,motionCanvas.height)

  let frame = motionCtx.getImageData(0,0,motionCanvas.width,motionCanvas.height)

  if(!prevFrame){
    prevFrame = frame
    return []
  }

  let motionPoints = []

  for(let i=0;i<frame.data.length;i+=16){

    let diff =
      Math.abs(frame.data[i]-prevFrame.data[i]) +
      Math.abs(frame.data[i+1]-prevFrame.data[i+1]) +
      Math.abs(frame.data[i+2]-prevFrame.data[i+2])

    if(diff > 70){

      let index = i/4
      let x = index % motionCanvas.width
      let y = Math.floor(index / motionCanvas.width)

      motionPoints.push({
        x:x/motionCanvas.width * width,
        y:y/motionCanvas.height * height
      })
    }
  }

  prevFrame = frame
  return motionPoints
}

function applyMotion(points){

  for(let p of points){

    for(let particle of particles){

      let dx = particle.x - p.x
      let dy = particle.y - p.y

      let dist = Math.sqrt(dx*dx + dy*dy)

      if(dist < 90){

        let force = (90-dist)/90

        particle.vx += dx/dist * force * 3
        particle.vy += dy/dist * force * 3
      }
    }
  }
}

function animate(){

  ctx.fillStyle="black"
  ctx.fillRect(0,0,width,height)

  maintainParticles()

  let motion = detectMotion()

  applyMotion(motion)

  for(let i=particles.length-1;i>=0;i--){

    let p = particles[i]

    p.update()
    p.draw()

    if(p.offscreen()){
      particles.splice(i,1)
    }
  }

  requestAnimationFrame(animate)
}

animate()

window.addEventListener("resize",()=>{

  width = window.innerWidth
  height = window.innerHeight

  canvas.width = width
  canvas.height = height
})

</script>

</body>
</html>

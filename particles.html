<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hand Particle Field</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}
canvas{
  position:absolute;
  top:0;
  left:0;
}
video{
  display:none;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<canvas id="motionCanvas" width="160" height="120" style="display:none"></canvas>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const motionCanvas = document.getElementById("motionCanvas")
const motionCtx = motionCanvas.getContext("2d")

let width = window.innerWidth
let height = window.innerHeight
canvas.width = width
canvas.height = height

let prevFrame = null

// Particle settings
const spacing = 14
const particles = []
const damping = 0.95

class Particle{
  constructor(x,y){
    this.x = x
    this.y = y
    this.vx = 0
    this.vy = 0
    this.baseX = x
    this.baseY = y
  }

  update(){
    let dx = this.baseX - this.x
    let dy = this.baseY - this.y

    this.vx += dx * 0.01
    this.vy += dy * 0.01

    this.vx *= damping
    this.vy *= damping

    this.x += this.vx
    this.y += this.vy
  }

  draw(){
    ctx.beginPath()
    ctx.arc(this.x,this.y,2,0,Math.PI*2)
    ctx.fillStyle="white"
    ctx.fill()
  }
}

// Create hex close packed grid
function initParticles(){
  particles.length = 0
  let rowOffset = false

  for(let y=0;y<height;y+=spacing){
    rowOffset = !rowOffset
    for(let x=0;x<width;x+=spacing){
      let px = x + (rowOffset ? spacing/2 : 0)
      particles.push(new Particle(px,y))
    }
  }
}

initParticles()

navigator.mediaDevices.getUserMedia({
  video:{facingMode:"user"},
  audio:false
}).then(stream=>{
  video.srcObject = stream
})

function detectMotion(){

  motionCtx.drawImage(video,0,0,motionCanvas.width,motionCanvas.height)

  let frame = motionCtx.getImageData(0,0,motionCanvas.width,motionCanvas.height)

  if(!prevFrame){
    prevFrame = frame
    return []
  }

  let motionPoints = []

  for(let i=0;i<frame.data.length;i+=4){

    let diff =
      Math.abs(frame.data[i]-prevFrame.data[i]) +
      Math.abs(frame.data[i+1]-prevFrame.data[i+1]) +
      Math.abs(frame.data[i+2]-prevFrame.data[i+2])

    if(diff > 80){

      let index = i/4
      let x = index % motionCanvas.width
      let y = Math.floor(index / motionCanvas.width)

      motionPoints.push({
        x:x/motionCanvas.width * width,
        y:y/motionCanvas.height * height
      })
    }
  }

  prevFrame = frame
  return motionPoints
}

function applyMotion(points){

  for(let p of points){

    for(let particle of particles){

      let dx = particle.x - p.x
      let dy = particle.y - p.y

      let dist = Math.sqrt(dx*dx+dy*dy)

      if(dist < 80){

        let force = (80-dist)/80

        particle.vx += dx/dist * force * 2
        particle.vy += dy/dist * force * 2
      }
    }
  }
}

function animate(){

  ctx.fillStyle="black"
  ctx.fillRect(0,0,width,height)

  let motion = detectMotion()
  applyMotion(motion)

  for(let p of particles){
    p.update()
    p.draw()
  }

  requestAnimationFrame(animate)
}

animate()

window.addEventListener("resize",()=>{
  width = window.innerWidth
  height = window.innerHeight
  canvas.width = width
  canvas.height = height
  initParticles()
})

</script>

</body>
</html>
